workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      unity: 6000.3.19f1
      vars:
        UNITY_IOS_EXPORT_PATH: ios_build
        XCODE_SCHEME: Unity-iPhone
      groups:
        - unity_credentials
    scripts:
      - name: Check Unity path
        script: |
          echo "UNITY_HOME: $UNITY_HOME"
          ls "$UNITY_HOME/Contents/MacOS/Unity" \
            && echo "Unity binary: OK" \
            || (echo "Unity binary: NOT FOUND at $UNITY_HOME" && exit 1)

      - name: Activate Unity license
        script: |
          $UNITY_HOME/Contents/MacOS/Unity -batchmode -quit -logFile - \
            -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD" || true

      - name: Build Unity iOS project
        script: |
          $UNITY_HOME/Contents/MacOS/Unity -batchmode -quit -logFile - \
            -projectPath . \
            -buildTarget iOS \
            -executeMethod BuildScript.BuildiOS \
            -outputPath "$UNITY_IOS_EXPORT_PATH"

      - name: Install CocoaPods dependencies
        script: |
          cd "$UNITY_IOS_EXPORT_PATH"
          if [ -f "Podfile" ]; then
            echo "Podfile found — running pod install"
            pod install
          else
            echo "No Podfile — skipping"
          fi

      - name: Build Xcode project (no code signing)
        script: |
          cd "$UNITY_IOS_EXPORT_PATH"
          if [ -f "Unity-iPhone.xcworkspace/contents.xcworkspacedata" ]; then
            BUILD_TARGET="-workspace Unity-iPhone.xcworkspace"
            echo "Building with .xcworkspace (CocoaPods)"
          else
            BUILD_TARGET="-project Unity-iPhone.xcodeproj"
            echo "Building with .xcodeproj"
          fi
          xcodebuild build \
            $BUILD_TARGET \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO

      - name: Package unsigned IPA
        script: |
          APP=$(find "$UNITY_IOS_EXPORT_PATH/DerivedData/Build/Products" -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in DerivedData"
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ARSpike_unsigned.ipa Payload/
          echo "IPA ready — $(du -sh ARSpike_unsigned.ipa | cut -f1)"

    artifacts:
      - ARSpike_unsigned.ipa

    publishing:
      email:
        recipients:
          - fouadayman58@gmail.com
        notify:
          success: true
          failure: true
