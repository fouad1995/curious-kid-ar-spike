workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      unity: 6000.3.19f1
      vars:
        UNITY_BIN: /Applications/Unity/Hub/Editor/6000.3.19f1/Unity.app/Contents/MacOS/Unity
        UNITY_IOS_EXPORT_PATH: ios_build
      groups:
        - unity_credentials
    scripts:
      - name: Check Unity installation
        script: |
          echo "Checking Unity at: $UNITY_BIN"
          ls "$UNITY_BIN" && echo "Unity found" || echo "Unity NOT found at expected path"
          echo "Installed editors:"
          ls /Applications/Unity/Hub/Editor/ || echo "No Unity Hub editors directory"

      - name: Activate Unity license
        script: |
          "$UNITY_BIN" \
            -batchmode -quit \
            -logFile /tmp/unity-license.log \
            -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD" || true
          cat /tmp/unity-license.log || true

      - name: Build Unity iOS project
        script: |
          "$UNITY_BIN" \
            -batchmode -quit \
            -logFile /tmp/unity-build.log \
            -projectPath . -buildTarget iOS \
            -executeMethod BuildScript.BuildiOS \
            -outputPath "$UNITY_IOS_EXPORT_PATH"
          cat /tmp/unity-build.log

      - name: Build Xcode project (no code signing)
        script: |
          cd "$UNITY_IOS_EXPORT_PATH"
          xcodebuild build \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO

      - name: Package unsigned IPA
        script: |
          APP=$(find "$UNITY_IOS_EXPORT_PATH/DerivedData/Build/Products" -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ARSpike_unsigned.ipa Payload/

    artifacts:
      - ARSpike_unsigned.ipa

    publishing:
      email:
        recipients:
          - fouadayman58@gmail.com
        notify:
          success: true
          failure: true
