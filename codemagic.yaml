workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      unity: 6000.3.19f1
      vars:
        UNITY_HOME: /Applications/Unity/Hub/Editor/6000.3.19f1
        UNITY_IOS_EXPORT_PATH: ios_build
      groups:
        - unity_credentials
    scripts:
      - name: Activate Unity license
        script: |
          "$UNITY_HOME/Unity.app/Contents/MacOS/Unity" \
            -batchmode -quit -logFile /dev/stdout \
            -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD"; true

      - name: Build Unity iOS project
        script: |
          "$UNITY_HOME/Unity.app/Contents/MacOS/Unity" \
            -batchmode -quit -logFile /dev/stdout \
            -projectPath . -buildTarget iOS \
            -executeMethod BuildScript.BuildiOS \
            -outputPath "$UNITY_IOS_EXPORT_PATH"

      - name: Build Xcode project (no code signing)
        script: |
          cd "$UNITY_IOS_EXPORT_PATH"
          xcodebuild build \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO

      - name: Package unsigned IPA
        script: |
          APP=$(find "$UNITY_IOS_EXPORT_PATH/DerivedData/Build/Products" -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ARSpike_unsigned.ipa Payload/

    artifacts:
      - ARSpike_unsigned.ipa

    publishing:
      email:
        recipients:
          - fouadayman58@gmail.com
        notify:
          success: true
          failure: true
